    * { margin:0; padding:0; box-sizing:border-box; }

    .sidebar::-webkit-scrollbar { width: 4px; }

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

// ============================================================
//  REGION HELPERS
// ============================================================
function getRegion(imageData, w, h, x0, y0, x1, y1) {
  const rw = x1 - x0, rh = y1 - y0;
  if (rw <= 0 || rh <= 0) return null;
  const data = new Uint8ClampedArray(rw * rh * 4);
  for (let dy = 0; dy < rh; dy++) {
    for (let dx = 0; dx < rw; dx++) {
      const si = ((y0+dy)*w + (x0+dx)) * 4;
      const di = (dy*rw + dx) * 4;
      data[di] = imageData.data[si];
      data[di+1] = imageData.data[si+1];
      data[di+2] = imageData.data[si+2];
      data[di+3] = imageData.data[si+3];
    }
  }
  return { data, width: rw, height: rh };
}

function putRegion(imageData, w, h, region, x0, y0) {
  const { data, width: rw, height: rh } = region;
  for (let dy = 0; dy < rh; dy++) {
    for (let dx = 0; dx < rw; dx++) {
      const si = (dy*rw + dx) * 4;
      const di = ((y0+dy)*w + (x0+dx)) * 4;
      imageData.data[di] = data[si];
      imageData.data[di+1] = data[si+1];
      imageData.data[di+2] = data[si+2];
      imageData.data[di+3] = data[si+3];
    }
  }
}

// ============================================================
//  EFFECT: GAUSSIAN BLUR (2-pass separable)
// ============================================================
function applyGaussianRegion(region, radius) {
  const { data, width, height } = region;
  const temp = new Uint8ClampedArray(data);
  // Horizontal
  for (let y = 0; y < height; y++) {
    for (let x = 0; x < width; x++) {
      let r=0,g=0,b=0,a=0,count=0;
      for (let dx = -radius; dx <= radius; dx++) {
        const px = Math.min(width-1, Math.max(0, x+dx));
        const idx = (y*width + px)*4;
        r += temp[idx]; g += temp[idx+1]; b += temp[idx+2]; a += temp[idx+3];
        count++;
      }
      const idx = (y*width + x)*4;
      data[idx] = r/count; data[idx+1] = g/count; data[idx+2] = b/count; data[idx+3] = a/count;
    }
  }
  // Vertical
  const temp2 = new Uint8ClampedArray(data);
  for (let y = 0; y < height; y++) {
    for (let x = 0; x < width; x++) {
      let r=0,g=0,b=0,a=0,count=0;
      for (let dy = -radius; dy <= radius; dy++) {
        const py = Math.min(height-1, Math.max(0, y+dy));
        const idx = (py*width + x)*4;
        r += temp2[idx]; g += temp2[idx+1]; b += temp2[idx+2]; a += temp2[idx+3];
        count++;
      }
      const idx = (y*width + x)*4;
      data[idx] = r/count; data[idx+1] = g/count; data[idx+2] = b/count; data[idx+3] = a/count;
    }
  }
}

// ============================================================
//  EFFECT: RAIN DROPS
// ============================================================
function applyRainDropsRegion(region, strength, density) {
  const { data, width, height } = region;
  const str = strength / 100;
  const dens = Math.max(0.3, density / 100);
  const temp = new Uint8ClampedArray(data);
  const numDrops = Math.floor(3 + dens * 12);

  // Blur background under drops
  const blurR = Math.max(1, Math.floor(str * 4));
  for (let y = 0; y < height; y++) {
    for (let x = 0; x < width; x++) {
      let r=0,g=0,b=0,count=0;
      for (let dy=-blurR; dy<=blurR; dy++) {
        for (let dx=-blurR; dx<=blurR; dx++) {
          const px = Math.min(width-1, Math.max(0, x+dx));
          const py = Math.min(height-1, Math.max(0, y+dy));
          const idx = (py*width + px)*4;
          r += temp[idx]; g += temp[idx+1]; b += temp[idx+2];
          count++;
        }
      }
      const idx = (y*width + x)*4;
      const mix = 0.3 + str * 0.5;
      data[idx] = data[idx] * (1 - mix) + (r/count) * mix;
      data[idx+1] = data[idx+1] * (1 - mix) + (g/count) * mix;
      data[idx+2] = data[idx+2] * (1 - mix) + (b/count) * mix;
    }
  }

  // Draw droplets
  for (let d = 0; d < numDrops; d++) {
    const cx = Math.random() * width;
    const cy = Math.random() * height;
    const radius = 4 + Math.random() * 12 * dens;
    const r2 = radius * radius;

    for (let y = Math.max(0, Math.floor(cy - radius - 2)); y < Math.min(height, Math.ceil(cy + radius + 2)); y++) {
      for (let x = Math.max(0, Math.floor(cx - radius - 2)); x < Math.min(width, Math.ceil(cx + radius + 2)); x++) {
        const dx = x - cx, dy = y - cy;
        const dist2 = dx*dx + dy*dy;
        if (dist2 > r2 + 4) continue;
        const dist = Math.sqrt(dist2);
        const idx = (y*width + x)*4;

        if (dist < radius) {
          const factor = 1 + 0.08 * str;
          const sx = Math.min(width-1, Math.max(0, Math.floor(cx + dx * factor)));
          const sy = Math.min(height-1, Math.max(0, Math.floor(cy + dy * factor)));
          const sidx = (sy*width + sx)*4;
          const blend = 0.6 + 0.4 * (1 - dist/radius);
          data[idx] = data[idx] * (1 - blend) + temp[sidx] * blend;
          data[idx+1] = data[idx+1] * (1 - blend) + temp[sidx+1] * blend;
          data[idx+2] = data[idx+2] * (1 - blend) + temp[sidx+2] * blend;
        }

        if (dist > radius - 1 && dist < radius + 2) {
          const shadow = (dist - radius + 1) * 60 * str;
          const angle = Math.atan2(dy, dx);
          if (angle > 0.3 && angle < 2.8) {
            data[idx] = Math.max(0, data[idx] - shadow);
            data[idx+1] = Math.max(0, data[idx+1] - shadow);
            data[idx+2] = Math.max(0, data[idx+2] - shadow);
          }
        }

        if (dist > radius * 0.3 && dist < radius * 0.7) {
          const angle = Math.atan2(dy, dx);
          if (angle > -1.2 && angle < -0.2) {
            const highlight = 80 * str * (1 - dist/radius);
            data[idx] = Math.min(255, data[idx] + highlight);
            data[idx+1] = Math.min(255, data[idx+1] + highlight * 0.9);
            data[idx+2] = Math.min(255, data[idx+2] + highlight * 1.1);
          }
        }

        if (dist > radius * 0.1 && dist < radius * 0.3) {
          const angle = Math.atan2(dy, dx);
          if (angle > -0.5 && angle < 0.1) {
            const sparkle = 120 * str * (1 - dist/radius);
            data[idx] = Math.min(255, data[idx] + sparkle);
            data[idx+1] = Math.min(255, data[idx+1] + sparkle);
            data[idx+2] = Math.min(255, data[idx+2] + sparkle);
          }
        }
      }
    }
  }

  // Streaks
  for (let d = 0; d < numDrops * 0.5; d++) {
    const x1 = Math.random() * width, y1 = Math.random() * height;
    const x2 = Math.min(width-1, Math.max(0, x1 + (Math.random()-0.5) * 40 * dens));
    const y2 = Math.min(height-1, Math.max(0, y1 + (Math.random()-0.5) * 40 * dens));
    const steps = Math.floor(5 + 15 * dens);
    for (let t = 0; t < steps; t++) {
      const frac = t / steps;
      const x = Math.floor(x1 + (x2 - x1) * frac);
      const y = Math.floor(y1 + (y2 - y1) * frac);
      if (x < 0 || x >= width || y < 0 || y >= height) continue;
      const idx = (y*width + x)*4;
      const brightness = 20 * str * (1 - Math.abs(frac - 0.5) * 2);
      data[idx] = Math.min(255, data[idx] + brightness);
      data[idx+1] = Math.min(255, data[idx+1] + brightness * 0.8);
      data[idx+2] = Math.min(255, data[idx+2] + brightness * 1.1);
    }
  }
}

// ============================================================
//  EFFECT: CRYSTAL / GEMSTONE
// ============================================================
function applyCrystalRegion(region, strength, density) {
  const { data, width, height } = region;
  const str = strength / 100;
  const dens = density / 100;
  const temp = new Uint8ClampedArray(data);

  // Prismatic color shift
  for (let y = 0; y < height; y++) {
    for (let x = 0; x < width; x++) {
      const idx = (y*width + x)*4;
      const dx = x / width - 0.5, dy = y / height - 0.5;
      const angle = Math.atan2(dy, dx);
      const dist = Math.sqrt(dx*dx + dy*dy);
      const hueShift = (Math.sin(angle * 3 + dist * 8 + Date.now()/5000) * 0.5 + 0.5) * str * 0.8;

      const r = temp[idx], g = temp[idx+1], b = temp[idx+2];
      const nr = r * (1 - str * 0.3) + (r * 0.3 + g * 0.6 + b * 0.1) * str * 0.3;
      const ng = g * (1 - str * 0.3) + (g * 0.3 + b * 0.6 + r * 0.1) * str * 0.3;
      const nb = b * (1 - str * 0.3) + (b * 0.3 + r * 0.6 + g * 0.1) * str * 0.3;

      const shiftAmt = (Math.sin(angle * 2 + dist * 4) * 0.5 + 0.5) * str * 40;
      data[idx] = Math.min(255, Math.max(0, nr + shiftAmt * 0.6));
      data[idx+1] = Math.min(255, Math.max(0, ng + shiftAmt * 0.3));
      data[idx+2] = Math.min(255, Math.max(0, nb + shiftAmt * 0.9));
    }
  }

  // Faceted highlights
  const numFacets = Math.floor(3 + dens * 8);
  for (let f = 0; f < numFacets; f++) {
    const cx = Math.random() * width;
    const cy = Math.random() * height;
    const size = 3 + Math.random() * 12 * dens;
    const angle = Math.random() * Math.PI * 2;
    const points = 3 + Math.floor(Math.random() * 3);

    for (let i = 0; i < points; i++) {
      const a1 = angle + (i / points) * Math.PI * 2;
      const a2 = angle + ((i+0.5) / points) * Math.PI * 2;
      const r1 = size * (0.6 + Math.random() * 0.4);
      const r2 = size * (0.6 + Math.random() * 0.4);
      const x1 = cx + Math.cos(a1) * r1, y1 = cy + Math.sin(a1) * r1;
      const x2 = cx + Math.cos(a2) * r2, y2 = cy + Math.sin(a2) * r2;

      const steps = Math.floor(3 + size * 0.5);
      for (let t = 0; t <= steps; t++) {
        const frac = t / steps;
        const x = Math.floor(x1 + (x2 - x1) * frac);
        const y = Math.floor(y1 + (y2 - y1) * frac);
        if (x < 0 || x >= width || y < 0 || y >= height) continue;
        const idx = (y*width + x)*4;
        const brightness = 60 * str * (1 - Math.abs(frac - 0.5) * 2) * (0.5 + Math.random() * 0.5);
        const r = data[idx], g = data[idx+1], b = data[idx+2];
        const gray = 0.299 * r + 0.587 * g + 0.114 * b;
        data[idx] = Math.min(255, r + brightness * (1 + (gray - 128) / 128));
        data[idx+1] = Math.min(255, g + brightness * (1 + (gray - 128) / 128) * 0.8);
        data[idx+2] = Math.min(255, b + brightness * (1 + (gray - 128) / 128) * 1.2);
      }
    }
  }

  // Sparkles
  const numSparks = Math.floor(5 + dens * 15);
  for (let s = 0; s < numSparks; s++) {
    const cx = Math.random() * width;
    const cy = Math.random() * height;
    const size = 1 + Math.random() * 3 * str;
    const intensity = 80 + Math.random() * 120 * str;
    for (let dy = -Math.ceil(size); dy <= Math.ceil(size); dy++) {
      for (let dx = -Math.ceil(size); dx <= Math.ceil(size); dx++) {
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist > size) continue;
        const x = Math.floor(cx + dx), y = Math.floor(cy + dy);
        if (x < 0 || x >= width || y < 0 || y >= height) continue;
        const idx = (y*width + x)*4;
        const falloff = 1 - dist / size;
        const val = intensity * falloff * falloff;
        data[idx] = Math.min(255, data[idx] + val);
        data[idx+1] = Math.min(255, data[idx+1] + val * 0.9);
        data[idx+2] = Math.min(255, data[idx+2] + val * 1.2);
      }
    }
  }
}

// ============================================================
//  EFFECT: WOOD GRAIN
// ============================================================
function applyWoodRegion(region, strength, density) {
  const { data, width, height } = region;
  const str = strength / 100;
  const dens = density / 100;
  const temp = new Uint8ClampedArray(data);

  const baseR = 160, baseG = 100, baseB = 50;

  for (let y = 0; y < height; y++) {
    for (let x = 0; x < width; x++) {
      const idx = (y*width + x)*4;
      const grain = Math.sin(x * 0.06 + y * 0.02 + 1.3) * 0.5 + 0.5;
      const grain2 = Math.cos(x * 0.04 - y * 0.03 + 2.7) * 0.5 + 0.5;
      const grain3 = Math.sin(x * 0.09 + y * 0.04 + 0.7) * 0.5 + 0.5;
      const mix = (grain * 0.5 + grain2 * 0.3 + grain3 * 0.2) * str * 0.5 * dens;

      const wr = baseR + mix * 60 + (Math.random() - 0.5) * 10 * str;
      const wg = baseG + mix * 40 + (Math.random() - 0.5) * 8 * str;
      const wb = baseB + mix * 30 + (Math.random() - 0.5) * 6 * str;

      const blend = 0.2 + str * 0.6;
      data[idx] = Math.min(255, temp[idx] * (1 - blend) + wr * blend);
      data[idx+1] = Math.min(255, temp[idx+1] * (1 - blend) + wg * blend);
      data[idx+2] = Math.min(255, temp[idx+2] * (1 - blend) + wb * blend);
    }
  }

  // Grain lines
  const numLines = Math.floor(4 + dens * 12);
  for (let l = 0; l < numLines; l++) {
    const startX = Math.random() * width;
    const startY = Math.random() * height;
    const len = 10 + Math.random() * 30 * dens;
    const angle = (Math.random() - 0.5) * 0.8;
    const waveAmp = 2 + Math.random() * 6 * dens;

    for (let t = 0; t < len; t++) {
      const frac = t / len;
      const x = Math.floor(startX + t * 1.5);
      const y = Math.floor(startY + Math.sin(frac * 3 + 1.2) * waveAmp + frac * 15 * angle);
      if (x < 0 || x >= width || y < 0 || y >= height) continue;
      const idx = (y*width + x)*4;
      const darkness = 40 * str * (0.5 + 0.5 * Math.sin(frac * 5 + 0.7));
      data[idx] = Math.max(0, data[idx] - darkness);
      data[idx+1] = Math.max(0, data[idx+1] - darkness * 0.8);
      data[idx+2] = Math.max(0, data[idx+2] - darkness * 0.6);
    }
  }

  // Knots
  const numKnots = Math.floor(1 + dens * 5);
  for (let k = 0; k < numKnots; k++) {
    const cx = Math.random() * width;
    const cy = Math.random() * height;
    const radius = 3 + Math.random() * 8 * dens;
    const r2 = radius * radius;
    for (let y = Math.max(0, Math.floor(cy - radius)); y < Math.min(height, Math.ceil(cy + radius)); y++) {
      for (let x = Math.max(0, Math.floor(cx - radius)); x < Math.min(width, Math.ceil(cx + radius)); x++) {
        const dx = x - cx, dy = y - cy;
        const dist2 = dx*dx + dy*dy;
        if (dist2 > r2) continue;
        const dist = Math.sqrt(dist2);
        const idx = (y*width + x)*4;
        const dark = 50 * str * (1 - dist/radius);
        data[idx] = Math.max(0, data[idx] - dark);
        data[idx+1] = Math.max(0, data[idx+1] - dark * 0.7);
        data[idx+2] = Math.max(0, data[idx+2] - dark * 0.4);
        if (dist > radius * 0.6 && dist < radius * 0.8) {
          const ring = 30 * str;
          data[idx] = Math.min(255, data[idx] + ring);
          data[idx+1] = Math.min(255, data[idx+1] + ring * 0.6);
          data[idx+2] = Math.min(255, data[idx+2] + ring * 0.3);
        }
      }
    }
  }
}

// ============================================================
//  EFFECT: BROKEN MIRROR
// ============================================================
function applyBrokenMirrorRegion(region, strength, density) {
  const { data, width, height } = region;
  const str = strength / 100;
  const dens = density / 100;
  const temp = new Uint8ClampedArray(data);

  const crackLines = [];
  const impacts = [];
  const numImpacts = Math.floor(1 + dens * 3);
  for (let i = 0; i < numImpacts; i++) {
    impacts.push({
      x: Math.random() * width,
      y: Math.random() * height,
      numLines: Math.floor(4 + Math.random() * 6)
    });
  }

  for (const impact of impacts) {
    const { x: cx, y: cy } = impact;
    const numLines = impact.numLines + Math.floor(dens * 4);
    for (let l = 0; l < numLines; l++) {
      const angle = Math.random() * Math.PI * 2;
      const len = 5 + Math.random() * 25 * dens * (0.5 + Math.random() * 0.5);
      const segments = Math.floor(3 + Math.random() * 5);
      let prevX = cx, prevY = cy;
      for (let s = 0; s < segments; s++) {
        const segLen = len / segments * (0.5 + Math.random() * 0.5);
        const segAngle = angle + (Math.random() - 0.5) * 0.8;
        const nx = prevX + Math.cos(segAngle) * segLen;
        const ny = prevY + Math.sin(segAngle) * segLen;
        crackLines.push({
          x1: Math.min(width-1, Math.max(0, prevX)),
          y1: Math.min(height-1, Math.max(0, prevY)),
          x2: Math.min(width-1, Math.max(0, nx)),
          y2: Math.min(height-1, Math.max(0, ny)),
          width: 0.5 + Math.random() * 1.5 * str,
          branch: Math.random() > 0.6
        });
        if (Math.random() > 0.5 && s > 0) {
          const bAngle = segAngle + (Math.random() - 0.5) * 1.2;
          const bLen = segLen * 0.3;
          crackLines.push({
            x1: prevX + Math.cos(segAngle) * segLen * 0.5,
            y1: prevY + Math.sin(segAngle) * segLen * 0.5,
            x2: prevX + Math.cos(segAngle) * segLen * 0.5 + Math.cos(bAngle) * bLen,
            y2: prevY + Math.sin(segAngle) * segLen * 0.5 + Math.sin(bAngle) * bLen,
            width: 0.3 + Math.random() * 0.8 * str,
            branch: false
          });
        }
        prevX = nx; prevY = ny;
      }
    }
  }

  for (const line of crackLines) {
    const { x1, y1, x2, y2, width: lineWidth } = line;
    const dx = x2 - x1, dy = y2 - y1;
    const len = Math.sqrt(dx*dx + dy*dy);
    if (len < 1) continue;
    const steps = Math.max(2, Math.floor(len * 1.5));

    for (let t = 0; t <= steps; t++) {
      const frac = t / steps;
      const x = Math.floor(x1 + dx * frac);
      const y = Math.floor(y1 + dy * frac);
      if (x < 0 || x >= width || y < 0 || y >= height) continue;
      const idx = (y*width + x)*4;

      const dark = 50 * str * lineWidth;
      data[idx] = Math.max(0, data[idx] - dark);
      data[idx+1] = Math.max(0, data[idx+1] - dark * 0.9);
      data[idx+2] = Math.max(0, data[idx+2] - dark * 0.8);

      const highlight = 80 * str * lineWidth * (0.5 + 0.5 * Math.sin(frac * 7 + 1.2));
      const perpX = -dy / len, perpY = dx / len;
      for (let side = -1; side <= 1; side += 2) {
        for (let w = 1; w <= Math.ceil(lineWidth); w++) {
          const px = Math.floor(x + perpX * w * side * 0.5);
          const py = Math.floor(y + perpY * w * side * 0.5);
          if (px < 0 || px >= width || py < 0 || py >= height) continue;
          const pidx = (py*width + px)*4;
          const hVal = highlight * (1 - (w-1) / (lineWidth + 1));
          data[pidx] = Math.min(255, data[pidx] + hVal * 0.6);
          data[pidx+1] = Math.min(255, data[pidx+1] + hVal * 0.7);
          data[pidx+2] = Math.min(255, data[pidx+2] + hVal * 0.9);
        }
      }

      if (lineWidth > 0.5 && Math.random() > 0.7) {
        const offset = Math.floor((Math.random() - 0.5) * 4 * str);
        const px = Math.min(width-1, Math.max(0, x + offset));
        const py = Math.min(height-1, Math.max(0, y + offset));
        const sidx = (py*width + px)*4;
        if (Math.random() > 0.5) {
          data[idx] = temp[sidx];
          data[idx+1] = temp[sidx+1];
          data[idx+2] = temp[sidx+2];
        }
      }
    }
  }

  // Shard reflections
  const numShards = Math.floor(2 + dens * 6);
  for (let s = 0; s < numShards; s++) {
    const cx = Math.random() * width;
    const cy = Math.random() * height;
    const size = 3 + Math.random() * 10 * dens;
    const angle = Math.random() * Math.PI * 2;
    const points = 3 + Math.floor(Math.random() * 3);

    for (let i = 0; i < points; i++) {
      const a1 = angle + (i / points) * Math.PI * 2;
      const a2 = angle + ((i+0.5) / points) * Math.PI * 2;
      const r1 = size * (0.5 + Math.random() * 0.5);
      const r2 = size * (0.5 + Math.random() * 0.5);
      const x1 = cx + Math.cos(a1) * r1, y1 = cy + Math.sin(a1) * r1;
      const x2 = cx + Math.cos(a2) * r2, y2 = cy + Math.sin(a2) * r2;

      const steps = Math.floor(2 + size * 0.3);
      for (let t = 0; t <= steps; t++) {
        const frac = t / steps;
        const x = Math.floor(x1 + (x2 - x1) * frac);
        const y = Math.floor(y1 + (y2 - y1) * frac);
        if (x < 0 || x >= width || y < 0 || y >= height) continue;
        const idx = (y*width + x)*4;
        const bright = 60 * str * (1 - Math.abs(frac - 0.5) * 2) * (0.5 + Math.random() * 0.5);
        data[idx] = Math.min(255, data[idx] + bright * 0.7);
        data[idx+1] = Math.min(255, data[idx+1] + bright * 0.8);
        data[idx+2] = Math.min(255, data[idx+2] + bright);
      }
    }
  }
}

// ============================================================
//  EFFECT DISPATCHER
// ============================================================
function applyEffectToRegion(region, type, strength, density) {
  switch(type) {
    case 'gaussian':
      applyGaussianRegion(region, Math.max(1, Math.floor(strength/12)));
      break;
    case 'water_ripple':
      applyRainDropsRegion(region, strength, density);
      break;
    case 'crystal':
      applyCrystalRegion(region, strength, density);
      break;
    case 'wood_scratch':
      applyWoodRegion(region, strength, density);
      break;
    case 'broken_mirror':
      applyBrokenMirrorRegion(region, strength, density);
      break;
    case 'mosaic':
      {
        applyGaussianRegion(region, Math.max(1, Math.floor(strength/15)));
        const { data, width, height } = region;
        const size = Math.max(3, Math.floor(strength/7));
        for (let y=0; y<height; y+=size) {
          for (let x=0; x<width; x+=size) {
            let r=0,g=0,b=0,a=0,count=0;
            for (let dy=0; dy<size && y+dy<height; dy++) {
              for (let dx=0; dx<size && x+dx<width; dx++) {
                const idx = ((y+dy)*width + (x+dx))*4;
                r += data[idx]; g += data[idx+1]; b += data[idx+2]; a += data[idx+3];
                count++;
              }
            }
            r/=count; g/=count; b/=count; a/=count;
            for (let dy=0; dy<size && y+dy<height; dy++) {
              for (let dx=0; dx<size && x+dx<width; dx++) {
                const idx = ((y+dy)*width + (x+dx))*4;
                data[idx] = r; data[idx+1] = g; data[idx+2] = b; data[idx+3] = a;
              }
            }
          }
        }
      }
      break;
    case 'bokeh':
      {
        const { data, width, height } = region;
        const radius = Math.max(2, Math.floor(strength/8));
        const temp = new Uint8ClampedArray(data);
        for (let y=0; y<height; y++) {
          for (let x=0; x<width; x++) {
            let r=0,g=0,b=0,a=0,count=0;
            for (let dy=-radius; dy<=radius; dy++) {
              for (let dx=-radius; dx<=radius; dx++) {
                const dist = Math.sqrt(dx*dx+dy*dy);
                if (dist > radius) continue;
                const px = Math.min(width-1, Math.max(0, x+dx));
                const py = Math.min(height-1, Math.max(0, y+dy));
                const idx = (py*width + px)*4;
                const w = 1 - (dist/radius);
                r += temp[idx]*w; g += temp[idx+1]*w; b += temp[idx+2]*w; a += temp[idx+3]*w;
                count += w;
              }
            }
            if (count > 0) {
              const idx = (y*width + x)*4;
              data[idx] = Math.min(255, r/count + 20);
              data[idx+1] = Math.min(255, g/count + 10);
              data[idx+2] = Math.min(255, b/count + 30);
              data[idx+3] = a/count;
            }
          }
        }
      }
      break;
    case 'motion':
      {
        const { data, width, height } = region;
        const radius = Math.max(1, Math.floor(strength/8));
        const temp = new Uint8ClampedArray(data);
        for (let y=0; y<height; y++) {
          for (let x=0; x<width; x++) {
            let r=0,g=0,b=0,a=0,count=0;
            for (let dx=-radius; dx<=radius; dx++) {
              const px = Math.min(width-1, Math.max(0, x+dx));
              const idx = (y*width + px)*4;
              r += temp[idx]; g += temp[idx+1]; b += temp[idx+2]; a += temp[idx+3];
              count++;
            }
            const idx = (y*width + x)*4;
            data[idx] = r/count; data[idx+1] = g/count; data[idx+2] = b/count; data[idx+3] = a/count;
          }
        }
      }
      break;
    case 'glow':
      {
        const { data, width, height } = region;
        const radius = Math.max(2, Math.floor(strength/10));
        const temp = new Uint8ClampedArray(data);
        for (let y=0; y<height; y++) {
          for (let x=0; x<width; x++) {
            let r=0,g=0,b=0,a=0,count=0;
            for (let dy=-radius; dy<=radius; dy++) {
              for (let dx=-radius; dx<=radius; dx++) {
                const dist = Math.sqrt(dx*dx+dy*dy);
                if (dist > radius) continue;
                const px = Math.min(width-1, Math.max(0, x+dx));
                const py = Math.min(height-1, Math.max(0, y+dy));
                const idx = (py*width + px)*4;
                const w = 1 - (dist/radius);
                r += temp[idx]*w; g += temp[idx+1]*w; b += temp[idx+2]*w; a += temp[idx+3]*w;
                count += w;
              }
            }
            if (count > 0) {
              const idx = (y*width + x)*4;
              const br = strength/100;
              data[idx] = Math.min(255, r/count + 30*br);
              data[idx+1] = Math.min(255, g/count + 20*br);
              data[idx+2] = Math.min(255, b/count + 40*br);
              data[idx+3] = a/count;
            }
          }
        }
      }
      break;
    case 'paint_smudge':
      {
        const { data, width, height } = region;
        const str = strength/100;
        const temp = new Uint8ClampedArray(data);
        const radius = Math.max(1, Math.floor(str*4));
        for (let y=0; y<height; y++) {
          for (let x=0; x<width; x++) {
            const dx = Math.floor((Math.random()-0.5)*radius*2);
            const dy = Math.floor((Math.random()-0.5)*radius*2);
            const px = Math.min(width-1, Math.max(0, x+dx));
            const py = Math.min(height-1, Math.max(0, y+dy));
            const idx = (y*width + x)*4;
            const sidx = (py*width + px)*4;
            const mix = 0.3 + str*0.5;
            data[idx] = temp[idx]*(1-mix) + temp[sidx]*mix;
            data[idx+1] = temp[idx+1]*(1-mix) + temp[sidx+1]*mix;
            data[idx+2] = temp[idx+2]*(1-mix) + temp[sidx+2]*mix;
          }
        }
      }
      break;
    case 'fog':
      {
        const { data, width, height } = region;
        const str = strength/100;
        for (let y=0; y<height; y++) {
          for (let x=0; x<width; x++) {
            const idx = (y*width + x)*4;
            const noise = (Math.sin(x*0.05 + y*0.07 + Date.now()/3000)*0.5+0.5)*str*0.5;
            data[idx] = Math.min(255, data[idx] + noise*50);
            data[idx+1] = Math.min(255, data[idx+1] + noise*40);
            data[idx+2] = Math.min(255, data[idx+2] + noise*60);
          }
        }
      }
      break;
    case 'smoke':
      {
        const { data, width, height } = region;
        const str = strength/100;
        for (let y=0; y<height; y++) {
          for (let x=0; x<width; x++) {
            const idx = (y*width + x)*4;
            const noise = (Math.sin(x*0.03 + y*0.05 + Date.now()/2500)*0.5+0.5)*str*0.6;
            const noise2 = (Math.cos(x*0.04 - y*0.06 + 1.3)*0.5+0.5)*str*0.4;
            const mix = noise*0.7 + noise2*0.3;
            data[idx] = Math.min(255, data[idx] + mix*60);
            data[idx+1] = Math.min(255, data[idx+1] + mix*50);
            data[idx+2] = Math.min(255, data[idx+2] + mix*70);
          }
        }
      }
      break;
    default:
      applyGaussianRegion(region, Math.max(1, Math.floor(strength/12)));
  }
}

// ============================================================
//  BRUSH PAINT
// ============================================================
function paintBrushEffect(canvas, x, y, radius, type, strength, density) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const w = canvas.width, h = canvas.height;
  const x0 = Math.max(0, Math.floor(x - radius));
  const y0 = Math.max(0, Math.floor(y - radius));
  const x1 = Math.min(w, Math.ceil(x + radius));
  const y1 = Math.min(h, Math.ceil(y + radius));
  if (x1 <= x0 || y1 <= y0) return;

  const imageData = ctx.getImageData(0, 0, w, h);
  const region = getRegion(imageData, w, h, x0, y0, x1, y1);
  if (!region) return;

  applyEffectToRegion(region, type, strength, density);
  putRegion(imageData, w, h, region, x0, y0);
  ctx.putImageData(imageData, 0, 0);
}

                <div className="upload-option" onClick={()=>fileInputRef.current && fileInputRef.current.click()}>
                  <i className="fas fa-images text-2xl text-indigo-400"></i>
                  <p className="text-sm mt-2 font-medium text-gray-300">Gallery</p>
                </div>
                <div className="upload-option" onClick={()=>cameraInputRef.current && cameraInputRef.current.click()}>
                  <i className="fas fa-camera text-2xl text-pink-400"></i>
                  <p className="text-sm mt-2 font-medium text-gray-300">Camera</p>
                </div>
                <div className="upload-option" onClick={()=>fileInputRef.current && fileInputRef.current.click()}>
                  <i className="fas fa-folder-open text-2xl text-emerald-400"></i>
                  <p className="text-sm mt-2 font-medium text-gray-300">Browse</p>
                </div>
              </div>
              <input type="file" ref={fileInputRef} accept="image/*" className="hidden" onChange={(e)=>{ if(e.target.files[0]) handleFileUpload(e.target.files[0]); e.target.value=''; }} />
              <input type="file" ref={cameraInputRef} accept="image/*" capture="environment" className="hidden" onChange={(e)=>{ if(e.target.files[0]) handleFileUpload(e.target.files[0]); e.target.value=''; }} />
            </div>
          </div>
        ) : (
          <div className="fade-in">
            <div className="flex flex-wrap items-center justify-between gap-3 mb-5 glass-card px-4 py-3">
              <div className="flex items-center gap-2 flex-wrap">
                <span className="text-xs font-semibold text-gray-400 uppercase tracking-wider mr-2"><i className="fas fa-paint-brush mr-1 text-indigo-400"></i> Brush Studio</span>
                <span className="text-xs text-gray-500 bg-white/5 px-3 py-1 rounded-full">Full Resolution: {image?.width}×{image?.height}</span>
              </div>
              <div className="flex items-center gap-2">
                <button className="tool-icon" onClick={undo} title="Undo"><i className="fas fa-undo"></i></button>
                <button className="tool-icon" onClick={redo} title="Redo"><i className="fas fa-redo"></i></button>
                <button className="tool-icon" onClick={resetImage} title="Reset"><i className="fas fa-rotate-left"></i></button>
                <button className="tool-icon" onClick={()=>setShowCompare(!showCompare)} title="Before / After"><i className="fas fa-not-equal"></i></button>
              </div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-[1fr_280px] gap-5">
              <div className="space-y-4">
                <div className="canvas-wrapper">
                  <canvas ref={canvasRef} onMouseDown={handleMouseDown} onMouseMove={handleMouseMove} onMouseUp={handleMouseUp} onMouseLeave={handleMouseLeave} className="w-full h-auto" style={{ maxHeight: '75vh' }} />
                  {isProcessing && <div className="absolute inset-0 bg-black/60 flex items-center justify-center rounded-2xl backdrop-blur-sm"><div className="text-center"><i className="fas fa-spinner fa-spin text-4xl text-indigo-400 mb-3"></i><p className="text-gray-300 font-medium">Processing...</p></div></div>}
                </div>
                {showCompare && imageUrl && (
                  <div className="glass-card px-4 py-3 flex items-center gap-4">
                    <span className="text-xs text-gray-400">Original</span>
                    <input type="range" min="0" max="100" value={comparePos} onChange={(e)=>setComparePos(Number(e.target.value))} className="flex-1 slider-thumb h-1.5 bg-gray-700 rounded-full appearance-none cursor-pointer" />
                    <span className="text-xs text-gray-400">Edited</span>
                  </div>
                )}
                <div className="text-xs text-gray-400 text-center bg-white/5 rounded-xl py-2">
                  <i className="fas fa-mouse-pointer mr-1 text-indigo-400"></i> Click & drag on image to paint the selected effect
                </div>
              </div>

              <div className="space-y-4 sidebar">
                <div className="glass-card p-4 space-y-4">
                  <div>
                    <p className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2"><i className="fas fa-palette mr-2"></i> Effects</p>
                    <div className="flex flex-wrap gap-1.5">
                      {blurTypes.map(b => (
                        <div key={b.id} className={`blur-type-chip text-xs px-3 py-1.5 ${blurType===b.id?'active':''}`} onClick={()=>setBlurType(b.id)}>
                          {b.label}
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="space-y-2.5">
                    <div>
                      <div className="flex items-center justify-between text-sm text-gray-300"><span><i className="fas fa-expand mr-2"></i> Brush Size</span><span className="text-indigo-400 font-medium">{brushSize}px</span></div>
                      <input type="range" min="8" max="120" value={brushSize} onChange={(e)=>setBrushSize(Number(e.target.value))} className="w-full slider-thumb h-1.5 bg-gray-700 rounded-full appearance-none cursor-pointer mt-1" />
                    </div>
                    <div>
                      <div className="flex items-center justify-between text-sm text-gray-300"><span><i className="fas fa-circle-dot mr-2"></i> Intensity</span><span className="text-indigo-400 font-medium">{blurStrength}%</span></div>
                      <input type="range" min="10" max="100" value={blurStrength} onChange={(e)=>setBlurStrength(Number(e.target.value))} className="w-full slider-thumb h-1.5 bg-gray-700 rounded-full appearance-none cursor-pointer mt-1" />
                    </div>
                    <div>
                      <div className="flex items-center justify-between text-sm text-gray-300"><span><i className="fas fa-droplet mr-2"></i> Detail</span><span className="text-indigo-400 font-medium">{waterDensity}%</span></div>
                      <input type="range" min="10" max="90" value={waterDensity} onChange={(e)=>setWaterDensity(Number(e.target.value))} className="w-full slider-thumb h-1.5 bg-gray-700 rounded-full appearance-none cursor-pointer mt-1" />
                    </div>
                  </div>

                  <div className="text-xs text-gray-400 bg-white/5 rounded-xl p-2 text-center border border-white/5">
                    <i className="fas fa-info-circle mr-1 text-indigo-400"></i>
                    <span className="text-white font-medium">{blurTypes.find(b=>b.id===blurType)?.label || blurType}</span>
                  </div>
                </div>

                <div className="glass-card p-4">
                  <p className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2"><i className="fas fa-download mr-2"></i> Export HD</p>
                  <div className="flex flex-wrap gap-2">
                    <button className="btn-primary text-sm py-2 px-3 flex-1" onClick={()=>exportImage('png',1)}><i className="fas fa-download mr-1.5"></i> PNG</button>
                    <button className="btn-secondary text-sm py-2 px-3 flex-1" onClick={()=>exportImage('jpeg',0.95)}><i className="fas fa-file-image mr-1.5"></i> JPG</button>
                    <button className="btn-secondary text-sm py-2 px-3" onClick={()=>exportImage('png',1)}><i className="fas fa-arrow-up mr-1.5"></i> 4K</button>
                  </div>
                  <p className="text-[10px] text-gray-500 mt-2 text-center">Exports at original resolution without quality loss</p>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>

      <footer className="border-t border-white/5 mt-8 pt-6 pb-4 text-center text-xs text-gray-500">
        <p><span className="text-indigo-400">ClearLens AI Studio</span> — Paint Creative Effects in Full HD. © 2026</p>
        <p className="mt-1 flex items-center justify-center gap-4">
          <span><i className="fas fa-shield-alt mr-1"></i> Privacy First</span>
          <span><i className="fas fa-bolt mr-1"></i> AI-Powered</span>
          <span><i className="fas fa-globe mr-1"></i> 100% Browser</span>
          <span><i className="fas fa-crown mr-1 text-yellow-500"></i> Full Resolution</span>
        </p>
      </footer>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
