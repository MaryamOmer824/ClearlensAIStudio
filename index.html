<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

// ========================================================================
//  REGION HELPERS
// ========================================================================
function getRegion(imageData, w, h, x0, y0, x1, y1) {
  const rw = x1 - x0, rh = y1 - y0;
  if (rw <= 0 || rh <= 0) return null;
  const data = new Uint8ClampedArray(rw * rh * 4);
  for (let dy = 0; dy < rh; dy++) {
    for (let dx = 0; dx < rw; dx++) {
      const si = ((y0+dy)*w + (x0+dx)) * 4;
      const di = (dy*rw + dx) * 4;
      data[di] = imageData.data[si];
      data[di+1] = imageData.data[si+1];
      data[di+2] = imageData.data[si+2];
      data[di+3] = imageData.data[si+3];
    }
  }
  return { data, width: rw, height: rh };
}
function putRegion(imageData, w, h, region, x0, y0) {
  const { data, width: rw, height: rh } = region;
  for (let dy = 0; dy < rh; dy++) {
    for (let dx = 0; dx < rw; dx++) {
      const si = (dy*rw + dx) * 4;
      const di = ((y0+dy)*w + (x0+dx)) * 4;
      imageData.data[di] = data[si];
      imageData.data[di+1] = data[si+1];
      imageData.data[di+2] = data[si+2];
      imageData.data[di+3] = data[si+3];
    }
  }
}

// ========================================================================
//  GAUSSIAN BLUR
// ========================================================================
function applyGaussianRegion(region, radius) {
  const { data, width, height } = region;
  if (radius < 1) return;
  const temp = new Uint8ClampedArray(data);
  for (let y = 0; y < height; y++) {
    for (let x = 0; x < width; x++) {
      let r=0,g=0,b=0,a=0,count=0;
      for (let dx=-radius; dx<=radius; dx++) {
        const px = Math.min(width-1, Math.max(0, x+dx));
        const idx = (y*width + px)*4;
        r += temp[idx]; g += temp[idx+1]; b += temp[idx+2]; a += temp[idx+3];
        count++;
      }
      const idx = (y*width + x)*4;
      data[idx]=r/count; data[idx+1]=g/count; data[idx+2]=b/count; data[idx+3]=a/count;
    }
  }
  const temp2 = new Uint8ClampedArray(data);
  for (let y = 0; y < height; y++) {
    for (let x = 0; x < width; x++) {
      let r=0,g=0,b=0,a=0,count=0;
      for (let dy=-radius; dy<=radius; dy++) {
        const py = Math.min(height-1, Math.max(0, y+dy));
        const idx = (py*width + x)*4;
        r += temp2[idx]; g += temp2[idx+1]; b += temp2[idx+2]; a += temp2[idx+3];
        count++;
      }
      const idx = (y*width + x)*4;
      data[idx]=r/count; data[idx+1]=g/count; data[idx+2]=b/count; data[idx+3]=a/count;
    }
  }
}

// ========================================================================
//  REAL WOOD
// ========================================================================
function applyWoodRegion(region, strength, density) {
  const { data, width, height } = region;
  const str=strength/100, dens=density/100;
  const temp=new Uint8ClampedArray(data);
  const baseR=180, baseG=110, baseB=55;
  for (let y=0; y<height; y++) {
    for (let x=0; x<width; x++) {
      const idx=(y*width+x)*4;
      const g1 = Math.sin(x*0.06 + y*0.018 + 1.3)*0.5+0.5;
      const g2 = Math.cos(x*0.04 - y*0.025 + 2.7)*0.5+0.5;
      const g3 = Math.sin(x*0.09 + y*0.035 + 0.7)*0.5+0.5;
      const g4 = Math.sin(x*0.12 - y*0.04 + 4.1)*0.5+0.5;
      const mix = (g1*0.4 + g2*0.25 + g3*0.2 + g4*0.15) * str * 0.6 * dens;
      const wr = baseR + mix*70 + (Math.random()-0.5)*12*str;
      const wg = baseG + mix*45 + (Math.random()-0.5)*8*str;
      const wb = baseB + mix*30 + (Math.random()-0.5)*6*str;
      const blend = 0.15 + str*0.65;
      data[idx] = Math.min(255, temp[idx]*(1-blend) + wr*blend);
      data[idx+1] = Math.min(255, temp[idx+1]*(1-blend) + wg*blend);
      data[idx+2] = Math.min(255, temp[idx+2]*(1-blend) + wb*blend);
    }
  }
  const numLines = Math.floor(5 + dens*14);
  for (let l=0; l<numLines; l++) {
    const sx=Math.random()*width, sy=Math.random()*height;
    const len=15+Math.random()*40*dens;
    const ang=(Math.random()-0.5)*0.7;
    const amp=3+Math.random()*8*dens;
    for (let t=0; t<len; t++) {
      const f=t/len;
      const x=Math.floor(sx + t*1.8);
      const y=Math.floor(sy + Math.sin(f*3+1.2)*amp + f*18*ang);
      if (x<0||x>=width||y<0||y>=height) continue;
      const idx=(y*width+x)*4;
      const dark=50*str*(0.5+0.5*Math.sin(f*4+0.7));
      data[idx]=Math.max(0, data[idx]-dark);
      data[idx+1]=Math.max(0, data[idx+1]-dark*0.8);
      data[idx+2]=Math.max(0, data[idx+2]-dark*0.6);
      if (Math.random()>0.7) {
        const h=20*str*(0.5+0.5*Math.sin(f*6+2.1));
        data[idx]=Math.min(255, data[idx]+h);
        data[idx+1]=Math.min(255, data[idx+1]+h*0.6);
      }
    }
  }
  const numKnots = Math.floor(1 + dens*6);
  for (let k=0; k<numKnots; k++) {
    const cx=Math.random()*width, cy=Math.random()*height;
    const rad=4+Math.random()*10*dens;
    for (let y=Math.max(0,Math.floor(cy-rad)); y<Math.min(height,Math.ceil(cy+rad)); y++) {
      for (let x=Math.max(0,Math.floor(cx-rad)); x<Math.min(width,Math.ceil(cx+rad)); x++) {
        const dx=x-cx, dy=y-cy, dist=Math.sqrt(dx*dx+dy*dy);
        if (dist>rad) continue;
        const idx=(y*width+x)*4;
        const dark=55*str*(1-dist/rad);
        data[idx]=Math.max(0, data[idx]-dark);
        data[idx+1]=Math.max(0, data[idx+1]-dark*0.7);
        data[idx+2]=Math.max(0, data[idx+2]-dark*0.4);
        if (dist>rad*0.55 && dist<rad*0.8) {
          const ring=35*str;
          data[idx]=Math.min(255, data[idx]+ring);
          data[idx+1]=Math.min(255, data[idx+1]+ring*0.5);
          data[idx+2]=Math.min(255, data[idx+2]+ring*0.3);
        }
      }
    }
  }
}

// ========================================================================
//  RAIN DROPS
// ========================================================================
function applyRainDropsRegion(region, strength, density) {
  const { data, width, height } = region;
  const str=strength/100, dens=Math.max(0.3,density/100);
  const temp=new Uint8ClampedArray(data);
  const numDrops=Math.floor(4 + dens*14);
  const blurR=Math.max(1, Math.floor(str*4));
  for (let y=0; y<height; y++) {
    for (let x=0; x<width; x++) {
      let r=0,g=0,b=0,count=0;
      for (let dy=-blurR; dy<=blurR; dy++) {
        for (let dx=-blurR; dx<=blurR; dx++) {
          const px=Math.min(width-1,Math.max(0,x+dx));
          const py=Math.min(height-1,Math.max(0,y+dy));
          const idx=(py*width+px)*4;
          r+=temp[idx]; g+=temp[idx+1]; b+=temp[idx+2]; count++;
        }
      }
      const idx=(y*width+x)*4;
      const mix=0.25+str*0.55;
      data[idx]=data[idx]*(1-mix)+(r/count)*mix;
      data[idx+1]=data[idx+1]*(1-mix)+(g/count)*mix;
      data[idx+2]=data[idx+2]*(1-mix)+(b/count)*mix;
    }
  }
  for (let d=0; d<numDrops; d++) {
    const cx=Math.random()*width, cy=Math.random()*height;
    const rad=4+Math.random()*14*dens;
    for (let y=Math.max(0,Math.floor(cy-rad-2)); y<Math.min(height,Math.ceil(cy+rad+2)); y++) {
      for (let x=Math.max(0,Math.floor(cx-rad-2)); x<Math.min(width,Math.ceil(cx+rad+2)); x++) {
        const dx=x-cx, dy=y-cy, dist=Math.sqrt(dx*dx+dy*dy);
        if (dist>rad+2) continue;
        const idx=(y*width+x)*4;
        if (dist<rad) {
          const factor=1+0.09*str;
          const sx=Math.min(width-1,Math.max(0,Math.floor(cx+dx*factor)));
          const sy=Math.min(height-1,Math.max(0,Math.floor(cy+dy*factor)));
          const sidx=(sy*width+sx)*4;
          const blend=0.55+0.45*(1-dist/rad);
          data[idx]=data[idx]*(1-blend)+temp[sidx]*blend;
          data[idx+1]=data[idx+1]*(1-blend)+temp[sidx+1]*blend;
          data[idx+2]=data[idx+2]*(1-blend)+temp[sidx+2]*blend;
          const tint=15*str*(1-dist/rad);
          data[idx]=Math.min(255, data[idx]+tint*0.3);
          data[idx+2]=Math.min(255, data[idx+2]+tint*0.7);
        }
        if (dist>rad-0.8 && dist<rad+1.5) {
          const shadow=(dist-rad+0.8)*70*str;
          const ang=Math.atan2(dy,dx);
          if (ang>0.2 && ang<2.9) {
            data[idx]=Math.max(0, data[idx]-shadow);
            data[idx+1]=Math.max(0, data[idx+1]-shadow);
            data[idx+2]=Math.max(0, data[idx+2]-shadow);
          }
        }
        if (dist>rad*0.25 && dist<rad*0.65) {
          const ang=Math.atan2(dy,dx);
          if (ang>-1.3 && ang<-0.15) {
            const hl=90*str*(1-dist/rad);
            data[idx]=Math.min(255, data[idx]+hl);
            data[idx+1]=Math.min(255, data[idx+1]+hl*0.85);
            data[idx+2]=Math.min(255, data[idx+2]+hl*1.1);
          }
        }
        if (dist>rad*0.08 && dist<rad*0.28) {
          const ang=Math.atan2(dy,dx);
          if (ang>-0.6 && ang<0.15) {
            const sp=140*str*(1-dist/rad);
            data[idx]=Math.min(255, data[idx]+sp);
            data[idx+1]=Math.min(255, data[idx+1]+sp);
            data[idx+2]=Math.min(255, data[idx+2]+sp);
          }
        }
      }
    }
  }
  for (let d=0; d<numDrops*0.6; d++) {
    const x1=Math.random()*width, y1=Math.random()*height;
    const x2=Math.min(width-1,Math.max(0,x1+(Math.random()-0.5)*45*dens));
    const y2=Math.min(height-1,Math.max(0,y1+(Math.random()-0.5)*45*dens));
    const steps=Math.floor(6+18*dens);
    for (let t=0; t<steps; t++) {
      const f=t/steps;
      const x=Math.floor(x1+(x2-x1)*f), y=Math.floor(y1+(y2-y1)*f);
      if (x<0||x>=width||y<0||y>=height) continue;
      const idx=(y*width+x)*4;
      const bright=25*str*(1-Math.abs(f-0.5)*2);
      data[idx]=Math.min(255, data[idx]+bright);
      data[idx+1]=Math.min(255, data[idx+1]+bright*0.75);
      data[idx+2]=Math.min(255, data[idx+2]+bright*1.15);
    }
  }
}

// ========================================================================
//  CRYSTAL
// ========================================================================
function applyCrystalRegion(region, strength, density) {
  const { data, width, height } = region;
  const str=strength/100, dens=density/100;
  const temp=new Uint8ClampedArray(data);
  for (let y=0; y<height; y++) {
    for (let x=0; x<width; x++) {
      const idx=(y*width+x)*4;
      const dx=x/width-0.5, dy=y/height-0.5;
      const ang=Math.atan2(dy,dx), dist=Math.sqrt(dx*dx+dy*dy);
      const hue=(Math.sin(ang*3+dist*6+Date.now()/5000)*0.5+0.5)*str*0.9;
      const r=temp[idx], g=temp[idx+1], b=temp[idx+2];
      const nr=r*(1-str*0.35)+(r*0.25+g*0.6+b*0.15)*str*0.35;
      const ng=g*(1-str*0.35)+(g*0.25+b*0.6+r*0.15)*str*0.35;
      const nb=b*(1-str*0.35)+(b*0.25+r*0.6+g*0.15)*str*0.35;
      const shift=(Math.sin(ang*2+dist*5)*0.5+0.5)*str*45;
      data[idx]=Math.min(255,Math.max(0,nr+shift*0.5));
      data[idx+1]=Math.min(255,Math.max(0,ng+shift*0.25));
      data[idx+2]=Math.min(255,Math.max(0,nb+shift*0.85));
    }
  }
  const numFacets=Math.floor(4+dens*10);
  for (let f=0; f<numFacets; f++) {
    const cx=Math.random()*width, cy=Math.random()*height;
    const size=4+Math.random()*14*dens;
    const ang=Math.random()*Math.PI*2;
    const pts=3+Math.floor(Math.random()*3);
    for (let i=0; i<pts; i++) {
      const a1=ang+(i/pts)*Math.PI*2;
      const a2=ang+((i+0.5)/pts)*Math.PI*2;
      const r1=size*(0.5+Math.random()*0.5);
      const r2=size*(0.5+Math.random()*0.5);
      const x1=cx+Math.cos(a1)*r1, y1=cy+Math.sin(a1)*r1;
      const x2=cx+Math.cos(a2)*r2, y2=cy+Math.sin(a2)*r2;
      const steps=Math.floor(3+size*0.4);
      for (let t=0; t<=steps; t++) {
        const f=t/steps;
        const x=Math.floor(x1+(x2-x1)*f), y=Math.floor(y1+(y2-y1)*f);
        if (x<0||x>=width||y<0||y>=height) continue;
        const idx=(y*width+x)*4;
        const bright=70*str*(1-Math.abs(f-0.5)*2)*(0.4+Math.random()*0.6);
        const gr=0.299*data[idx]+0.587*data[idx+1]+0.114*data[idx+2];
        data[idx]=Math.min(255, data[idx]+bright*(1+(gr-128)/128));
        data[idx+1]=Math.min(255, data[idx+1]+bright*(1+(gr-128)/128)*0.7);
        data[idx+2]=Math.min(255, data[idx+2]+bright*(1+(gr-128)/128)*1.3);
      }
    }
  }
  const numSparks=Math.floor(6+dens*18);
  for (let s=0; s<numSparks; s++) {
    const cx=Math.random()*width, cy=Math.random()*height;
    const size=1+Math.random()*3.5*str;
    const inten=90+Math.random()*140*str;
    for (let dy=-Math.ceil(size); dy<=Math.ceil(size); dy++) {
      for (let dx=-Math.ceil(size); dx<=Math.ceil(size); dx++) {
        const dist=Math.sqrt(dx*dx+dy*dy);
        if (dist>size) continue;
        const x=Math.floor(cx+dx), y=Math.floor(cy+dy);
        if (x<0||x>=width||y<0||y>=height) continue;
        const idx=(y*width+x)*4;
        const fall=1-dist/size;
        const val=inten*fall*fall;
        data[idx]=Math.min(255, data[idx]+val);
        data[idx+1]=Math.min(255, data[idx+1]+val*0.85);
        data[idx+2]=Math.min(255, data[idx+2]+val*1.25);
      }
    }
  }
}

// ========================================================================
//  BROKEN MIRROR
// ========================================================================
function applyBrokenMirrorRegion(region, strength, density) {
  const { data, width, height } = region;
  const str=strength/100, dens=density/100;
  const temp=new Uint8ClampedArray(data);
  const cracks=[];
  const impacts=[];
  const numImpacts=Math.floor(1+dens*4);
  for (let i=0; i<numImpacts; i++) {
    impacts.push({ x:Math.random()*width, y:Math.random()*height, numLines:Math.floor(4+Math.random()*7) });
  }
  for (const imp of impacts) {
    const {x:cx,y:cy} = imp;
    const numLines = imp.numLines + Math.floor(dens*5);
    for (let l=0; l<numLines; l++) {
      const ang=Math.random()*Math.PI*2;
      const len=6+Math.random()*30*dens*(0.4+Math.random()*0.6);
      const segs=Math.floor(3+Math.random()*6);
      let px=cx, py=cy;
      for (let s=0; s<segs; s++) {
        const slen=len/segs*(0.4+Math.random()*0.6);
        const sang=ang+(Math.random()-0.5)*0.9;
        const nx=px+Math.cos(sang)*slen;
        const ny=py+Math.sin(sang)*slen;
        cracks.push({
          x1:Math.min(width-1,Math.max(0,px)), y1:Math.min(height-1,Math.max(0,py)),
          x2:Math.min(width-1,Math.max(0,nx)), y2:Math.min(height-1,Math.max(0,ny)),
          w:0.5+Math.random()*1.8*str
        });
        if (Math.random()>0.55 && s>0) {
          const bang=sang+(Math.random()-0.5)*1.3;
          const blen=slen*0.3;
          cracks.push({
            x1:px+Math.cos(sang)*slen*0.5, y1:py+Math.sin(sang)*slen*0.5,
            x2:px+Math.cos(sang)*slen*0.5+Math.cos(bang)*blen,
            y2:py+Math.sin(sang)*slen*0.5+Math.sin(bang)*blen,
            w:0.3+Math.random()*1*str
          });
        }
        px=nx; py=ny;
      }
    }
  }
  for (const line of cracks) {
    const {x1,y1,x2,y2,w:lw}=line;
    const dx=x2-x1, dy=y2-y1;
    const len=Math.sqrt(dx*dx+dy*dy);
    if (len<1) continue;
    const steps=Math.max(2, Math.floor(len*1.6));
    for (let t=0; t<=steps; t++) {
      const f=t/steps;
      const x=Math.floor(x1+dx*f), y=Math.floor(y1+dy*f);
      if (x<0||x>=width||y<0||y>=height) continue;
      const idx=(y*width+x)*4;
      const dark=55*str*lw;
      data[idx]=Math.max(0, data[idx]-dark);
      data[idx+1]=Math.max(0, data[idx+1]-dark*0.9);
      data[idx+2]=Math.max(0, data[idx+2]-dark*0.8);
      const hl=90*str*lw*(0.4+0.6*Math.sin(f*6+1.2));
      const perpX=-dy/len, perpY=dx/len;
      for (let side=-1; side<=1; side+=2) {
        for (let w=1; w<=Math.ceil(lw); w++) {
          const px=Math.floor(x+perpX*w*side*0.4);
          const py=Math.floor(y+perpY*w*side*0.4);
          if (px<0||px>=width||py<0||py>=height) continue;
          const pidx=(py*width+px)*4;
          const hv=hl*(1-(w-1)/(lw+1));
          data[pidx]=Math.min(255, data[pidx]+hv*0.5);
          data[pidx+1]=Math.min(255, data[pidx+1]+hv*0.6);
          data[pidx+2]=Math.min(255, data[pidx+2]+hv*0.8);
        }
      }
      if (lw>0.4 && Math.random()>0.75) {
        const off=Math.floor((Math.random()-0.5)*5*str);
        const px=Math.min(width-1,Math.max(0,x+off));
        const py=Math.min(height-1,Math.max(0,y+off));
        const sidx=(py*width+px)*4;
        if (Math.random()>0.5) {
          data[idx]=temp[sidx]; data[idx+1]=temp[sidx+1]; data[idx+2]=temp[sidx+2];
        }
      }
    }
  }
  const numShards=Math.floor(3+dens*8);
  for (let s=0; s<numShards; s++) {
    const cx=Math.random()*width, cy=Math.random()*height;
    const size=4+Math.random()*12*dens;
    const ang=Math.random()*Math.PI*2;
    const pts=3+Math.floor(Math.random()*3);
    for (let i=0; i<pts; i++) {
      const a1=ang+(i/pts)*Math.PI*2;
      const a2=ang+((i+0.5)/pts)*Math.PI*2;
      const r1=size*(0.4+Math.random()*0.6);
      const r2=size*(0.4+Math.random()*0.6);
      const x1=cx+Math.cos(a1)*r1, y1=cy+Math.sin(a1)*r1;
      const x2=cx+Math.cos(a2)*r2, y2=cy+Math.sin(a2)*r2;
      const steps=Math.floor(2+size*0.3);
      for (let t=0; t<=steps; t++) {
        const f=t/steps;
        const x=Math.floor(x1+(x2-x1)*f), y=Math.floor(y1+(y2-y1)*f);
        if (x<0||x>=width||y<0||y>=height) continue;
        const idx=(y*width+x)*4;
        const bright=70*str*(1-Math.abs(f-0.5)*2)*(0.4+Math.random()*0.6);
        data[idx]=Math.min(255, data[idx]+bright*0.6);
        data[idx+1]=Math.min(255, data[idx+1]+bright*0.7);
        data[idx+2]=Math.min(255, data[idx+2]+bright*0.95);
      }
    }
  }
}

// ========================================================================
//  FOG
// ========================================================================
function applyFogRegion(region, strength, density) {
  const { data, width, height } = region;
  const str=strength/100, dens=density/100;
  const temp=new Uint8ClampedArray(data);
  const blurR=Math.max(1, Math.floor(str*4));
  for (let y=0; y<height; y++) {
    for (let x=0; x<width; x++) {
      let r=0,g=0,b=0,count=0;
      for (let dy=-blurR; dy<=blurR; dy++) {
        for (let dx=-blurR; dx<=blurR; dx++) {
          const px=Math.min(width-1,Math.max(0,x+dx));
          const py=Math.min(height-1,Math.max(0,y+dy));
          const idx=(py*width+px)*4;
          r+=temp[idx]; g+=temp[idx+1]; b+=temp[idx+2];
          count++;
        }
      }
      const idx=(y*width+x)*4;
      data[idx]=r/count; data[idx+1]=g/count; data[idx+2]=b/count;
    }
  }
  const time=Date.now()/3000;
  for (let y=0; y<height; y++) {
    for (let x=0; x<width; x++) {
      const idx=(y*width+x)*4;
      const n1=Math.sin(x*0.04+y*0.06+time)*0.5+0.5;
      const n2=Math.cos(x*0.03-y*0.05+time*0.7)*0.5+0.5;
      const n3=Math.sin(x*0.07+y*0.03+time*1.3)*0.5+0.5;
      const noise=(n1*0.5+n2*0.3+n3*0.2)*dens*0.8;
      const fogAmt=0.15+str*0.55 + noise*0.25*str;
      const r=data[idx], g=data[idx+1], b=data[idx+2];
      const fogR=220+fogAmt*35, fogG=220+fogAmt*30, fogB=225+fogAmt*30;
      data[idx]=Math.min(255, r*(1-fogAmt)+fogR*fogAmt);
      data[idx+1]=Math.min(255, g*(1-fogAmt)+fogG*fogAmt);
      data[idx+2]=Math.min(255, b*(1-fogAmt)+fogB*fogAmt);
    }
  }
}

// ========================================================================
//  SMOKE
// ========================================================================
function applySmokeRegion(region, strength, density) {
  const { data, width, height } = region;
  const str=strength/100, dens=density/100;
  const temp=new Uint8ClampedArray(data);
  const blurR=Math.max(1, Math.floor(str*3));
  for (let y=0; y<height; y++) {
    for (let x=0; x<width; x++) {
      let r=0,g=0,b=0,count=0;
      for (let dy=-blurR; dy<=blurR; dy++) {
        for (let dx=-blurR; dx<=blurR; dx++) {
          const px=Math.min(width-1,Math.max(0,x+dx));
          const py=Math.min(height-1,Math.max(0,y+dy));
          const idx=(py*width+px)*4;
          r+=temp[idx]; g+=temp[idx+1]; b+=temp[idx+2];
          count++;
        }
      }
      const idx=(y*width+x)*4;
      data[idx]=r/count; data[idx+1]=g/count; data[idx+2]=b/count;
    }
  }
  const time=Date.now()/2500;
  for (let y=0; y<height; y++) {
    for (let x=0; x<width; x++) {
      const idx=(y*width+x)*4;
      const dx=x/width, dy=y/height;
      const swirl=Math.sin(dx*12+dy*8+time)*0.5+0.5;
      const swirl2=Math.cos(dx*8-dy*12+time*0.8)*0.5+0.5;
      const swirl3=Math.sin(dx*16+dy*6+time*1.2)*0.5+0.5;
      const noise=(swirl*0.4+swirl2*0.35+swirl3*0.25)*dens*0.9;
      const smokeAmt=0.1+str*0.5 + noise*0.3*str;
      const r=data[idx], g=data[idx+1], b=data[idx+2];
      const smokeR=200+smokeAmt*55, smokeG=195+smokeAmt*50, smokeB=205+smokeAmt*50;
      data[idx]=Math.min(255, r*(1-smokeAmt)+smokeR*smokeAmt);
      data[idx+1]=Math.min(255, g*(1-smokeAmt)+smokeG*smokeAmt);
      data[idx+2]=Math.min(255, b*(1-smokeAmt)+smokeB*smokeAmt);
    }
  }
  const numTendrils=Math.floor(2+dens*8);
  for (let t=0; t<numTendrils; t++) {
    const sx=Math.random()*width, sy=Math.random()*height;
    const len=20+Math.random()*50*dens;
    const ang=Math.random()*Math.PI*2;
    const waveAmp=5+Math.random()*15*dens;
    for (let i=0; i<len; i++) {
      const f=i/len;
      const x=Math.floor(sx+i*1.2*Math.cos(ang)+Math.sin(f*4+1.3)*waveAmp*f*0.5);
      const y=Math.floor(sy+i*1.2*Math.sin(ang)+Math.cos(f*3+0.7)*waveAmp*f*0.4);
      if (x<0||x>=width||y<0||y>=height) continue;
      const idx=(y*width+x)*4;
      const bright=40*str*(1-f)*(0.5+0.5*Math.sin(f*6+2.1));
      data[idx]=Math.min(255, data[idx]+bright);
      data[idx+1]=Math.min(255, data[idx+1]+bright*0.9);
      data[idx+2]=Math.min(255, data[idx+2]+bright*1.05);
      for (let k=-2; k<=2; k++) {
        const px=Math.min(width-1,Math.max(0,x+k));
        const py=Math.min(height-1,Math.max(0,y+k));
        const pidx=(py*width+px)*4;
        data[pidx]=Math.min(255, data[pidx]+bright*0.3*(1-Math.abs(k)/3));
      }
    }
  }
}

// ========================================================================
//  EFFECT DISPATCHER
// ========================================================================
function applyEffectToRegion(region, type, strength, density) {
  switch(type) {
    case 'water_ripple': applyRainDropsRegion(region, strength, density); break;
    case 'crystal': applyCrystalRegion(region, strength, density); break;
    case 'wood_scratch': applyWoodRegion(region, strength, density); break;
    case 'broken_mirror': applyBrokenMirrorRegion(region, strength, density); break;
    case 'fog': applyFogRegion(region, strength, density); break;
    case 'smoke': applySmokeRegion(region, strength, density); break;
    case 'gaussian': applyGaussianRegion(region, Math.max(1, Math.floor(strength/12))); break;
    case 'mosaic': {
      applyGaussianRegion(region, Math.max(1, Math.floor(strength/15)));
      const { data, width, height } = region;
      const size=Math.max(3, Math.floor(strength/7));
      for (let y=0; y<height; y+=size) {
        for (let x=0; x<width; x+=size) {
          let r=0,g=0,b=0,a=0,count=0;
          for (let dy=0; dy<size && y+dy<height; dy++) {
            for (let dx=0; dx<size && x+dx<width; dx++) {
              const idx=((y+dy)*width+(x+dx))*4;
              r+=data[idx]; g+=data[idx+1]; b+=data[idx+2]; a+=data[idx+3];
              count++;
            }
          }
          r/=count; g/=count; b/=count; a/=count;
          for (let dy=0; dy<size && y+dy<height; dy++) {
            for (let dx=0; dx<size && x+dx<width; dx++) {
              const idx=((y+dy)*width+(x+dx))*4;
              data[idx]=r; data[idx+1]=g; data[idx+2]=b; data[idx+3]=a;
            }
          }
        }
      }
      break;
    }
    case 'bokeh': {
      const { data, width, height } = region;
      const radius=Math.max(2, Math.floor(strength/8));
      const temp=new Uint8ClampedArray(data);
      for (let y=0; y<height; y++) {
        for (let x=0; x<width; x++) {
          let r=0,g=0,b=0,a=0,count=0;
          for (let dy=-radius; dy<=radius; dy++) {
            for (let dx=-radius; dx<=radius; dx++) {
              const dist=Math.sqrt(dx*dx+dy*dy);
              if (dist>radius) continue;
              const px=Math.min(width-1,Math.max(0,x+dx));
              const py=Math.min(height-1,Math.max(0,y+dy));
              const idx=(py*width+px)*4;
              const w=1-dist/radius;
              r+=temp[idx]*w; g+=temp[idx+1]*w; b+=temp[idx+2]*w; a+=temp[idx+3]*w;
              count+=w;
            }
          }
          if (count>0) {
            const idx=(y*width+x)*4;
            data[idx]=Math.min(255, r/count+18);
            data[idx+1]=Math.min(255, g/count+8);
            data[idx+2]=Math.min(255, b/count+28);
            data[idx+3]=a/count;
          }
        }
      }
      break;
    }
    case 'motion': {
      const { data, width, height } = region;
      const radius=Math.max(1, Math.floor(strength/8));
      const temp=new Uint8ClampedArray(data);
      for (let y=0; y<height; y++) {
        for (let x=0; x<width; x++) {
          let r=0,g=0,b=0,a=0,count=0;
          for (let dx=-radius; dx<=radius; dx++) {
            const px=Math.min(width-1,Math.max(0,x+dx));
            const idx=(y*width+px)*4;
            r+=temp[idx]; g+=temp[idx+1]; b+=temp[idx+2]; a+=temp[idx+3];
            count++;
          }
          const idx=(y*width+x)*4;
          data[idx]=r/count; data[idx+1]=g/count; data[idx+2]=b/count; data[idx+3]=a/count;
        }
      }
      break;
    }
    case 'glow': {
      const { data, width, height } = region;
      const radius=Math.max(2, Math.floor(strength/10));
      const temp=new Uint8ClampedArray(data);
      for (let y=0; y<height; y++) {
        for (let x=0; x<width; x++) {
          let r=0,g=0,b=0,a=0,count=0;
          for (let dy=-radius; dy<=radius; dy++) {
            for (let dx=-radius; dx<=radius; dx++) {
              const dist=Math.sqrt(dx*dx+dy*dy);
              if (dist>radius) continue;
              const px=Math.min(width-1,Math.max(0,x+dx));
              const py=Math.min(height-1,Math.max(0,y+dy));
              const idx=(py*width+px)*4;
              const w=1-dist/radius;
              r+=temp[idx]*w; g+=temp[idx+1]*w; b+=temp[idx+2]*w; a+=temp[idx+3]*w;
              count+=w;
            }
          }
          if (count>0) {
            const idx=(y*width+x)*4;
            const br=strength/100;
            data[idx]=Math.min(255, r/count+28*br);
            data[idx+1]=Math.min(255, g/count+18*br);
            data[idx+2]=Math.min(255, b/count+38*br);
            data[idx+3]=a/count;
          }
        }
      }
      break;
    }
    case 'paint_smudge': {
      const { data, width, height } = region;
      const str=strength/100;
      const temp=new Uint8ClampedArray(data);
      const radius=Math.max(1, Math.floor(str*4));
      for (let y=0; y<height; y++) {
        for (let x=0; x<width; x++) {
          const dx=Math.floor((Math.random()-0.5)*radius*2);
          const dy=Math.floor((Math.random()-0.5)*radius*2);
          const px=Math.min(width-1,Math.max(0,x+dx));
          const py=Math.min(height-1,Math.max(0,y+dy));
          const idx=(y*width+x)*4;
          const sidx=(py*width+px)*4;
          const mix=0.25+str*0.55;
          data[idx]=temp[idx]*(1-mix)+temp[sidx]*mix;
          data[idx+1]=temp[idx+1]*(1-mix)+temp[sidx+1]*mix;
          data[idx+2]=temp[idx+2]*(1-mix)+temp[sidx+2]*mix;
        }
      }
      break;
    }
    default: applyGaussianRegion(region, Math.max(1, Math.floor(strength/12)));
  }
}

// ========================================================================
//  BRUSH PAINT
// ========================================================================
function paintBrushEffect(canvas, x, y, radius, type, strength, density) {
  if (!canvas) return;
  const ctx=canvas.getContext('2d');
  const w=canvas.width, h=canvas.height;
  const x0=Math.max(0,Math.floor(x-radius));
  const y0=Math.max(0,Math.floor(y-radius));
  const x1=Math.min(w,Math.ceil(x+radius));
  const y1=Math.min(h,Math.ceil(y+radius));
  if (x1<=x0 || y1<=y0) return;

  const imageData=ctx.getImageData(0,0,w,h);
  const region=getRegion(imageData,w,h,x0,y0,x1,y1);
  if (!region) return;
  applyEffectToRegion(region, type, strength, density);
  putRegion(imageData,w,h,region,x0,y0);
  ctx.putImageData(imageData,0,0);
}

  ];

  const handleFileUpload = (file) => {
